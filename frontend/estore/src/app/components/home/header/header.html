<div class="w-full shadow-lg shadow gray-500/50 bg-gray-900">
  <div class="flex items-center">
    <div class="text-white ml-2 p-3 w-[23%]">
      <h1 class="text-xl font-bold">eStore</h1>
    </div>
    <div class="p-0 my-4 w-[50%] h-[2.5rem] bg-white flex items-center">
      <select
        #categoryoptions
        class="w-auto bg-gray-300 h-full border-none font-semibold px-2 pr-5"
      >
        @for (mainCategory of categoriesStore.topLevelCategories(); track $index) {
          <option [value]="mainCategory.id">{{ mainCategory.categoryName }}</option>
        }
      </select>
      <input
        #keyword
        type="text"
        class="w-[90%] h-full inline-block border-none outline-none px-3"
        placeholder="Search..."
      />
      <button
        (click)="onSearchClick(keyword.value, categoryoptions.value)"
        class="w-[10%] h-10 border-none bg-gray-300 flex justify-center items-center"
      >
        <fa-icon [icon]="faSearch"></fa-icon>
      </button>
    </div>

    <div class="flex items-center w-[27%] gap-6 justify-end h-full">
      <div class="flex items-center gap-2 text-white">
        <fa-icon [icon]="faUserCircle" class="text-white text-[1.3em]"></fa-icon>
        <h5>
          <a href="#" class="text-white no-underline hover:underline"> Sign In</a>
        </h5>
        <span>/</span>
        <h5>
          <a href="#" class="text-white no-underline hover:underline">Register</a>
        </h5>
      </div>
    </div>
    <div class="flex items-center gap-4 text-white text-[1.3em] mx-4">
      <fa-icon [icon]="faHeart"></fa-icon>
      <fa-icon [icon]="faShoppingCart"></fa-icon>
    </div>
  </div>
</div>
