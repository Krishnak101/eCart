<div class="flex flex-wrap my-10 max-w-6xl mx-auto p-4">
  <div class="w-full md:w-5/12 p-4 text-right">
    <img
      [src]="'../../../../assets/images/' + product()?.imageUrl"
      alt="Jacket"
      class="h-[25em] rounded-xl inline-block shadow-md"
    />
  </div>
  <div class="w-full md:w-7/12 mt-6 md:mt-0 md:pl-12">
    <span class="text-[2.4em] font-bold mr-4">{{ product()?.productName }}</span>
    <app-ratings [score]="product()?.ratings ?? 0"></app-ratings>
    <hr class="my-4" />
    <div class="text-[1.3em] font-medium text-gray-600 mb-4">
      <span class="text-[1.4em] font-semibold text-black">{{ product()?.price | currency }}</span>
      <div class="text-sm">Inclusive of all taxes</div>
    </div>
    <div class="text-[1.3em] font-semibold text-gray-00">{{ product()?.productDescription }}</div>
    <button
      class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition duration-300"
    >
      Add to Cart
    </button>
  </div>
</div>
